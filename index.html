<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zenvy Store 🛍️</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- 🔷 NAVBAR -->
<div class="navbar">
    <h2>Zenvy Store 🛍️</h2>
    <input type="text" placeholder="Search products..." id="searchBox" onkeyup="searchProducts()">
</div>

<!-- 🔷 TOP ICONS -->
<div class="top-icons">
    <span title="Wishlist">❤️ <span id="favCount">0</span></span>

    <span onclick="scrollToCart()" style="cursor:pointer;" title="Cart">
        🛒 <span id="cartCount">0</span>
    </span>

    <button onclick="toggleDark()" title="Dark Mode">🌙</button>
</div>

<!-- 🔷 FILTERS -->
<div class="filters">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('beauty')">Beauty</button>
    <button onclick="filterCategory('fragrances')">Perfume</button>
    <button onclick="filterCategory('furniture')">Furniture</button>
    <button onclick="filterCategory('groceries')">Grocery</button>
</div>

<!-- 🔷 CONTROLS -->
<div class="controls">
    <select onchange="filterPrice(this.value)">
        <option value="all">All Prices</option>
        <option value="1000">Below ₹1000</option>
        <option value="10000">Below ₹10000</option>
        <option value="50000">Below ₹50000</option>
    </select>

    <select onchange="sortProducts(this.value)">
        <option value="">Sort By</option>
        <option value="low">Low → High</option>
        <option value="high">High → Low</option>
    </select>

    <select onchange="filterRating(this.value)">
        <option value="all">All Ratings</option>
        <option value="4">4⭐ & above</option>
        <option value="3">3⭐ & above</option>
    </select>
</div>

<!-- 🔷 PRODUCT DETAILS POPUP -->
<div id="popup" class="popup"></div>

<!-- 🔷 PRODUCTS -->
<div id="products" class="product-container"></div>

<!-- 🔷 CART -->
<h2 class="cart-title">🛒 Your Cart</h2>
<div id="cartItems" class="cart-container"></div>

<!-- 🔷 ORDER BUTTON -->
<div class="order-box">
    <button class="order-btn" onclick="placeOrder()">✅ Place Order</button>
</div>

<!-- 🔥 ORDER SUCCESS POPUP -->
<div id="orderPopup" class="popup order-popup">
    <h2>🎉 Order Placed Successfully!</h2>
    <div id="orderDetails"></div>
    <button onclick="closeOrderPopup()">OK</button>
</div>

<!-- 🔷 TOAST -->
<div id="toast"></div>

<!-- 🔷 FLOATING CART -->
<div class="cart-float" onclick="scrollToCart()">🛒</div>

<script src="script.js"></script>
</body>
</html>
