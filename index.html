<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zenvy Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>Zenvy Store 🛍️</h2>
    <input type="text" placeholder="Search products..." id="searchBox" onkeyup="searchProducts()">
</div>

<!-- Top Icons -->
<div class="top-icons">
    <span>❤️ <span id="favCount">0</span></span>
    <span>🛒 <span id="cartCount">0</span></span>
</div>

<!-- Filters -->
<div class="filters">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('electronics')">Electronics</button>
    <button onclick="filterCategory('clothing')">Fashion</button>
    <button onclick="filterCategory('jewelery')">Jewelry</button>
</div>

<!-- Controls -->
<div class="controls">
    <select onchange="filterPrice(this.value)">
        <option value="all">All Prices</option>
        <option value="1000">Below ₹1000</option>
        <option value="10000">Below ₹10000</option>
        <option value="50000">Below ₹50000</option>
    </select>

    <select onchange="sortProducts(this.value)">
        <option value="">Sort By</option>
        <option value="low">Price Low → High</option>
        <option value="high">Price High → Low</option>
    </select>

    <select onchange="filterRating(this.value)">
        <option value="all">All Ratings</option>
        <option value="4">4⭐ & above</option>
        <option value="3">3⭐ & above</option>
    </select>
</div>

<!-- Products -->
<div id="products" class="product-container"></div>

<!-- Toast -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
