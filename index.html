<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Zenvy Store</h1>

    <!-- Category Filter -->
    <div class="filters">
        <button onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('electronics')">Electronics</button>
        <button onclick="filterCategory('fashion')">Fashion</button>
        <button onclick="filterCategory('books')">Books</button>
    </div>

    <!-- Product Container -->
    <div id="products" class="product-container"></div>

    <script src="script.js"></script>
</body>
</html>
